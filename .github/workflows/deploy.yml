name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.service }}
    strategy:
      matrix:
        service: [frontend, backend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & Push ${{ matrix.service }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.${{ matrix.service }}
          push: true
          tags: ghcr.io/${{ github.repository }}/${{ matrix.service }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max



  deploy:
    name: Deploy to VPS
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_TARGET_DIR: ${{ secrets.VPS_TARGET_DIR || '/root/lidm' }}
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
          GH_PAT: ${{ secrets.GH_PAT }}
          SHA_TAG: sha-${{ github.sha }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -t ed25519,rsa "$VPS_HOST" >> ~/.ssh/known_hosts
          SSH_OPTS=(-o StrictHostKeyChecking=yes -o LogLevel=error)

          # Git pull — discard local changes, pull latest
          ssh "${SSH_OPTS[@]}" "$VPS_USER@$VPS_HOST" \
            "cd $VPS_TARGET_DIR && \
             git remote set-url origin https://x-access-token:${GH_PAT}@github.com/lsar-lidm-2026/longitudinal-student-academic-record-system-lidm.git && \
             git reset --hard HEAD && \
             git pull origin main"

          # Write .env
          printf '%s\n' "$PRODUCTION_ENV" | ssh "${SSH_OPTS[@]}" "$VPS_USER@$VPS_HOST" "cat > $VPS_TARGET_DIR/.env"

          # Login GHCR on VPS (use GITHUB_TOKEN — same token that pushed the images)
          ssh "${SSH_OPTS[@]}" "$VPS_USER@$VPS_HOST" \
            "echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
             cd $VPS_TARGET_DIR && \
             export FRONTEND_TAG=${SHA_TAG} BACKEND_TAG=${SHA_TAG} && \
             docker compose pull && \
             docker compose up -d --remove-orphans && \
             docker image prune -f --filter 'until=24h' 2>/dev/null; true"
