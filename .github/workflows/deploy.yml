name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Deploy to VPS
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_TARGET_DIR: ${{ secrets.VPS_TARGET_DIR || '/root/lidm' }}
        run: |
          set -euo pipefail

          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -t ed25519,rsa "$VPS_HOST" >> ~/.ssh/known_hosts

          SSH_OPTS=(-o StrictHostKeyChecking=yes)

          # Ensure target dir exists
          ssh "${SSH_OPTS[@]}" "$VPS_USER@$VPS_HOST" "mkdir -p $VPS_TARGET_DIR"

          # Send source to VPS via tar pipe
          tar cz \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.next \
            --exclude='*.lock' \
            deploy.sh \
            docker-compose.yml \
            Dockerfile.frontend \
            Dockerfile.backend \
            apps/backend/package.json \
            apps/backend/bun.lock \
            apps/backend/tsconfig.json \
            apps/backend/prisma/ \
            apps/backend/src/ \
            apps/frontend/package.json \
            apps/frontend/bun.lock \
            apps/frontend/next.config.ts \
            apps/frontend/tsconfig.json \
            apps/frontend/public/ \
            apps/frontend/app/ \
            apps/frontend/components/ \
            apps/frontend/lib/ \
            apps/frontend/hooks/ \
            apps/frontend/types/ \
            apps/frontend/middleware.ts \
          | ssh "${SSH_OPTS[@]}" "$VPS_USER@$VPS_HOST" "cd $VPS_TARGET_DIR && tar xz"

          # Run deploy script on VPS
          ssh "${SSH_OPTS[@]}" "$VPS_USER@$VPS_HOST" "cd $VPS_TARGET_DIR && bash deploy.sh"
