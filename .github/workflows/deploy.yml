name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ── Build & Push Frontend ────────────────────────────────────
      - name: Build & Push Frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build & Push Backend ─────────────────────────────────────
      - name: Build & Push Backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy to VPS ────────────────────────────────────────────
      - name: Deploy to VPS
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_TARGET_DIR: ${{ secrets.VPS_TARGET_DIR || '/root/lidm' }}
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
        run: |
          set -euo pipefail

          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -t ed25519,rsa "$VPS_HOST" >> ~/.ssh/known_hosts

          SSH_OPTS=(-o StrictHostKeyChecking=yes)

          # Ensure target dir exists
          ssh "${SSH_OPTS[@]}" "$VPS_USER@$VPS_HOST" "mkdir -p $VPS_TARGET_DIR"

          # Write .env to VPS
          printf '%s\n' "$PRODUCTION_ENV" | ssh "${SSH_OPTS[@]}" "$VPS_USER@$VPS_HOST" "cat > $VPS_TARGET_DIR/.env"

          # Send docker-compose.yml to VPS
          scp "${SSH_OPTS[@]}" docker-compose.yml "$VPS_USER@$VPS_HOST:$VPS_TARGET_DIR/docker-compose.yml"

          # Pull latest images and restart
          ssh "${SSH_OPTS[@]}" "$VPS_USER@$VPS_HOST" bash -c "
            cd $VPS_TARGET_DIR
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f --filter 'until=24h' 2>/dev/null || true
          "
